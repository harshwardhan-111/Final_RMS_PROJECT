<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Reviewer Dashboard</title>
  <link rel="stylesheet" href="../css/global.css">
  <link rel="stylesheet" href="../css/dashboard.css">
  <link rel="stylesheet" href="../css/reviewer-dashboard.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
</head>
<body>

<nav class="navbar">
    <h2>Reviewer Dashboard</h2>
    <button onclick="logout()">Logout</button>
</nav>

<div class="rev-dashboard">

  <aside class="rev-sidebar">
    <h3>Assigned Events</h3>
    <div id="eventList" class="event-list"></div>
  </aside>

  <main class="rev-main">
    <section id="eventDetailsSection" class="event-details-section hidden">
      <h3>Event Details</h3>
      <div id="eventDetails" class="event-details"></div>
    </section>

    <section id="submissionsSection" class="submissions-section hidden">
      <h3>Student Submissions</h3>
      <div id="submissionTable" class="submission-table" style="overflow-x: auto;"></div>
    </section>
  </main>

</div>

<script src="../js/auth.js"></script>
<script src="../js/reviewer.js"></script>

</body>
</html>
