<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Student Dashboard</title>
    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/dashboard.css">
</head>
<body>

<nav class="navbar">
    <h2>Student Dashboard</h2>
    <button onclick="logout()">Logout</button>
</nav>

<div class="container">

    <div class="card" id="joinEventSection">
        <h3>Join Event</h3>
        <input type="text" id="eventCode" placeholder="Enter Event Code (e.g. ABCD1234)">
        <button onclick="joinEvent()">Join Event</button>
    </div>

    <div id="myEventsSection" class="section">
        <h3 style="margin-top: 20px;">My Joined Events</h3>
        <div id="eventList" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px;"></div>
    </div>

    <div id="eventWorkspaceSection" class="section hidden">
        <button onclick="showSection('myEventsSection')" style="background:#6c757d; margin-bottom: 20px;">← Back to Events</button>
        <div id="workspaceContent">
            </div>
    </div>

    <h3 style="margin-top: 40px; padding-top: 20px; border-top: 1px solid #eee;">All My Submissions</h3>
    <div id="submissionList"></div>

</div>

<script src="../js/auth.js"></script>
<script src="../js/student.js"></script>
</body>
</html>
