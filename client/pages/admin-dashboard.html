<!DOCTYPE html>
<html>
<head>
    <title>Admin Dashboard</title>
    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/dashboard.css">
</head>
<body>

<div class="layout">

    <!-- Sidebar -->
    <div class="sidebar">
        <h2>Admin</h2>

        <div class="menu-item" onclick="showSection('createReviewerSection')">
            👤 Create Reviewer
        </div>

        <div class="menu-item" onclick="showSection('createEventSection')">
            📅 Create Event
        </div>

        <div class="menu-item" onclick="showSection('viewEventsSection')">
            📋 View Events
        </div>

        <div class="menu-item" onclick="showSection('viewReviewersSection')">
            👥 View Reviewers
        </div>

        <div class="menu-item" onclick="showSection('issuesSection')">
            ⚠ Issues
        </div>

        <div class="menu-item logout" onclick="logout()">
            🚪 Logout
        </div>
    </div>

    <!-- Main Content -->
    <div class="content">

        <!-- Create Reviewer -->
        <div id="createReviewerSection" class="section">
            <h2>Create Reviewer</h2>
            <input type="text" id="reviewerName" placeholder="Name">
            <input type="email" id="reviewerEmail" placeholder="Email">
            <input type="password" id="reviewerPassword" placeholder="Password">
            <button onclick="createReviewer()">Create Reviewer</button>
        </div>
        <div id="createEventSection" class="section hidden">
            <h2>Create Event (Conference/Academic)</h2>
            <input type="text" id="eventTitle" placeholder="Event Title">
            
            <select id="eventType">
                <option value="Academic">Academic Project</option>
                <option value="Conference">Conference</option>
            </select>
            
            <textarea id="eventDesc" placeholder="Event Description"></textarea>
            
            <input type="text" id="eventBannerUrl" placeholder="Banner Image URL (Optional)">
            
            <div style="margin: 10px 0;">
                <input type="checkbox" id="allowMultiple" style="width:auto; display:inline-block;">
                <label for="allowMultiple">Allow Multiple Submissions per Student</label>
            </div>

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 15px;">
                <div>
                    <label>Overall Event Start:</label>
                    <input type="datetime-local" id="eventStartDate">
                </div>
                <div>
                    <label>Overall Event End:</label>
                    <input type="datetime-local" id="eventEndDate">
                </div>
                <div>
                    <label>Registration Start (Optional):</label>
                    <input type="datetime-local" id="regStart">
                </div>
                <div>
                    <label>Registration End (Optional):</label>
                    <input type="datetime-local" id="regEnd">
                </div>
                <div>
                    <label>Submission Start:</label>
                    <input type="datetime-local" id="subStart">
                </div>
                <div>
                    <label>Submission End:</label>
                    <input type="datetime-local" id="subEnd">
                </div>
            </div>

            <button onclick="createEventHandler()" style="margin-top: 20px;">Create Event</button>
        </div>
        
        <!-- View Events -->
        <div id="viewEventsSection" class="section hidden">
            <h2>All Events</h2>
            <div id="eventList"></div>
        </div>

        <!-- View Reviewers -->
        <div id="viewReviewersSection" class="section hidden">
            <h2>All Reviewers</h2>
            <input type="text" id="searchReviewerInput" placeholder="🔍 Search by Reviewer Name or Event Name..." onkeyup="filterReviewers()" style="margin-bottom: 20px;">
            <div id="reviewerList"></div>
        </div>

        <!-- Issues -->
        <div id="issuesSection" class="section hidden">
            <h2>Issues</h2>
            <p>No issues system implemented yet.</p>
        </div>

    </div>
</div>


<script src="../js/auth.js"></script>
<script src="../js/admin.js"></script>
</body>
</html>
